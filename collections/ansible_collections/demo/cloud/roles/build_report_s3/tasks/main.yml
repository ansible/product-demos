---
- name: Create report bucket
  amazon.aws.s3_bucket:
    name: "{{ reports_aws_bucket_name }}"
    region: "{{ reports_aws_region }}"
    state: present
    policy: "{{ lookup('ansible.builtin.template', 'policy.json') }}"
    public_access:
      block_public_acls: false
      block_public_policy: false
      ignore_public_acls: false
      restrict_public_buckets: false

- name: Configure bucket for static website hosting
  ansible.builtin.shell: |
    {{ _apd_python }} <<'PY'
    import boto3

    boto3.client("s3", region_name="{{ reports_aws_region }}").put_bucket_website(
        Bucket="{{ reports_aws_bucket_name }}",
        WebsiteConfiguration={"IndexDocument": {"Suffix": "index.html"}},
    )
    PY
  changed_when: true
  vars:
    _apd_python: "{{ ansible_playbook_python | default('/usr/bin/python3.12') }}"
  args:
    executable: /bin/bash

- name: Find report static files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/files"
    file_type: file
    recurse: true
  register: _report_static_files

- name: Upload report static files to S3
  amazon.aws.s3_object:
    bucket: "{{ reports_aws_bucket_name }}"
    object: "{{ item.path | regex_replace('^' ~ playbook_dir ~ '/files/?', '') }}"
    src: "{{ item.path }}"
    mode: put
  loop: "{{ _report_static_files.files }}"
  when: _report_static_files.matched > 0

- name: Get bucket objects
  amazon.aws.s3_object_info:
    bucket_name: "{{ reports_aws_bucket_name }}"
  register: bucket_objects

- name: Put index.html
  amazon.aws.s3_object:
    bucket: "{{ reports_aws_bucket_name }}"
    object: index.html
    src: "{{ playbook_dir }}/index.html"
    mode: put
    headers:
      ContentType: text/html

- name: Print bucket URL
  ansible.builtin.debug:
    msg: "Bucket URL: http://{{ reports_aws_bucket_name }}.s3-website-{{ reports_aws_region }}.amazonaws.com"
