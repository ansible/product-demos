---
- name: Create VM from blueprint
  hosts: localhost
  gather_facts: false
  vars:
    create_vm_vm_purpose: "{{ create_vm_vm_purpose | default('demo') }}"
    create_vm_vm_environment: "{{ create_vm_vm_environment | default('Dev') }}"
    aws_blueprint_vars_file: "{{ playbook_dir }}/blueprints/{{ vm_blueprint }}.yml"

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - create_vm_aws_region is defined
          - create_vm_vm_name is defined
          - create_vm_vm_owner is defined
          - create_vm_vm_deployment is defined
          - vm_blueprint is defined
          - create_vm_aws_vpc_subnet_name is defined
          - create_vm_aws_securitygroup_name is defined
          - create_vm_aws_keypair_name is defined
        fail_msg: "Missing one or more required create_vm_* variables"

    - name: Load blueprint variables
      ansible.builtin.include_vars:
        file: "{{ aws_blueprint_vars_file }}"

    - name: Resolve subnet by name
      amazon.aws.ec2_vpc_subnet_info:
        region: "{{ create_vm_aws_region }}"
        filters:
          "tag:Name": "{{ create_vm_aws_vpc_subnet_name }}"
      register: aws_subnet_info

    - name: Ensure subnet exists
      ansible.builtin.assert:
        that:
          - aws_subnet_info.subnets | length > 0
        fail_msg: "No subnet found for name {{ create_vm_aws_vpc_subnet_name }}"

    - name: Locate blueprint AMI
      amazon.aws.ec2_ami_info:
        region: "{{ create_vm_aws_region }}"
        owners: "{{ aws_image_owners | default(omit) }}"
        filters:
          name: "{{ create_vm_aws_image_filter | default(aws_image_filter) }}"
          architecture: "{{ aws_image_architecture | default(omit) }}"
      register: aws_ami_info

    - name: Ensure at least one AMI match
      ansible.builtin.assert:
        that:
          - aws_ami_info.images | length > 0
        fail_msg: "No AMI found for blueprint {{ vm_blueprint }}"

    - name: Choose newest AMI
      ansible.builtin.set_fact:
        aws_selected_ami: "{{ (aws_ami_info.images | sort(attribute='creation_date')) | last }}"

    - name: Create EC2 instance
      amazon.aws.ec2_instance:
        region: "{{ create_vm_aws_region }}"
        name: "{{ create_vm_vm_name }}"
        key_name: "{{ create_vm_aws_keypair_name }}"
        instance_type: "{{ create_vm_aws_instance_size | default(aws_instance_size) }}"
        image_id: "{{ aws_selected_ami.image_id }}"
        security_group: "{{ create_vm_aws_securitygroup_name }}"
        vpc_subnet_id: "{{ aws_subnet_info.subnets[0].id }}"
        wait: true
        network:
          assign_public_ip: true
        tags:
          Name: "{{ create_vm_vm_name }}"
          owner: "{{ create_vm_vm_owner }}"
          deployment: "{{ create_vm_vm_deployment }}"
          purpose: "{{ create_vm_vm_purpose }}"
          env: "{{ create_vm_vm_environment | lower }}"
          blueprint: "{{ vm_blueprint }}"
