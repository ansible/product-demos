---
- name: Cloud VPC report
  hosts: localhost
  gather_facts: false
  vars:
    reports_aws_region: "{{ reports_aws_region | default('us-east-1') }}"

  tasks:
    - name: Collect VPC facts
      amazon.aws.ec2_vpc_net_info:
        region: "{{ reports_aws_region }}"
      register: aws_vpc_report

    - name: Display VPC summary
      ansible.builtin.debug:
        msg:
          region: "{{ reports_aws_region }}"
          vpc_count: "{{ aws_vpc_report.vpcs | length }}"
