---
- name: Create AWS keypair
  hosts: localhost
  vars:
    aws_key_name: aws-test-key
    aws_keypair_owner: apd-demo

  tasks:
    - name: Derive public key from machine credential when not supplied
      when: aws_public_key is not defined
      block:
        - name: Fail if no private key available
          ansible.builtin.assert:
            that:
              - ansible_ssh_private_key_file is defined
            fail_msg: >-
              aws_public_key was not provided and no SSH private key was found on
              the APD Machine Credential. Attach APD Machine Credential to this job
              or supply aws_public_key in the survey.

        - name: Set public key from private key
          ansible.builtin.set_fact:
            aws_public_key: "{{ lookup('pipe', 'ssh-keygen -y -f ' ~ ansible_ssh_private_key_file) }}"

    - name: Fail if variables not defined
      ansible.builtin.assert:
        that:
          - aws_key_name is defined
          - create_vm_aws_region is defined
          - aws_public_key is defined
          - aws_keypair_owner is defined
        fail_msg: "Required variables not set"

    - name: Create AWS keypair
      amazon.aws.ec2_key:
        name: "{{ aws_key_name }}"
        region: "{{ create_vm_aws_region }}"
        key_material: "{{ aws_public_key }}"
        state: present
        tags:
          owner: "{{ aws_keypair_owner }}"

    - name: Set VPC stats
      ansible.builtin.set_stats:
        data:
          stat_aws_key_pair: '{{ aws_key_name }}'
